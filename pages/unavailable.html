<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Module non disponible — TicketFlow</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .unavailable-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 56px 48px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow: var(--shadow-md);
    }
    .unavailable-icon {
      width: 72px; height: 72px;
      background: #f1f5f9;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .unavailable-icon svg { width: 32px; height: 32px; color: var(--gray); }
    h1 { font-size: 1.5rem; margin-bottom: 12px; }
    p { color: var(--text-light); line-height: 1.7; margin-bottom: 32px; font-size: 0.95rem; }
    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .version-badge {
      display: inline-block;
      background: #f1f5f9;
      color: var(--gray);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="unavailable-card">
    <div class="unavailable-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>
      </svg>
    </div>
    <div class="version-badge">Prochainement</div>
    <h1>Module non disponible</h1>
    <p id="msg">Cette fonctionnalité est en cours de développement et sera disponible dans une prochaine version de la plateforme.</p>
    <div class="actions">
      <a href="../index.html" class="btn btn-ghost">Retour à l'accueil</a>
      <a href="login.html" class="btn btn-primary">Se connecter</a>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const feature = params.get('feature');
    const messages = {
      dashboard_agent:  'L\'espace agent est en cours de développement. Il sera disponible dans la prochaine version.',
      dashboard_admin:  'Le panel administrateur est en cours de développement. Il sera disponible dans une prochaine version.',
      messaging:        'La messagerie sur ticket est en cours de développement.',
      register:         'L\'inscription est temporairement désactivée par l\'administrateur.',
      pricing:          'La section tarifs n\'est pas encore disponible.',
    };
    if (feature && messages[feature]) {
      document.getElementById('msg').textContent = messages[feature];
    }
  </script>
</body>
</html>
